<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; }
  a { color: var(--gold, #c9a24a); text-decoration: none; }
  a:hover { color: var(--gold-soft, #e3c876); }
  .ph { background-image: repeating-linear-gradient(135deg, rgba(201,162,74,0.10) 0 2px, transparent 2px 11px); }
</style>
</helmet>
<div style="--gold:{{ gold }}; --gold-soft:#e3c876; --radius:{{ radius }}; background:#0d0b09; color:#ece4d6; font-family:'Jost',sans-serif; font-weight:300; min-height:100vh;">

  <!-- NAV -->
  <header style="position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between; padding:20px clamp(24px,5vw,72px); background:rgba(13,11,9,0.82); backdrop-filter:blur(12px); border-bottom:1px solid rgba(201,162,74,0.18);">
    <a href="Salon One-Pager.dc.html" style="display:flex; flex-direction:column; line-height:1;">
      <span style="font-family:'Cormorant Garamond',serif; font-size:26px; letter-spacing:0.5px; color:#f4eede;">Nidhi</span>
      <span style="font-size:9px; letter-spacing:4px; text-transform:uppercase; color:var(--gold,#c9a24a); margin-top:3px;">Unisex Salon</span>
    </a>
    <nav style="display:flex; align-items:center; gap:36px;">
      <a href="Salon One-Pager.dc.html#home" style="font-size:13px; letter-spacing:1.5px; text-transform:uppercase; color:#ece4d6;">Home</a>
      <a href="Salon One-Pager.dc.html#services" style="font-size:13px; letter-spacing:1.5px; text-transform:uppercase; color:#ece4d6;">Services</a>
      <a href="Salon One-Pager.dc.html#testimonial" style="font-size:13px; letter-spacing:1.5px; text-transform:uppercase; color:#ece4d6;">Testimonial</a>
      <a href="Salon One-Pager.dc.html#contact" style="font-size:13px; letter-spacing:1.5px; text-transform:uppercase; color:#ece4d6;">Contact</a>
      <a href="Salon Gallery.dc.html" style="font-size:13px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold,#c9a24a);">Gallery</a>
    </nav>
  </header>

  <!-- HEADER -->
  <section style="text-align:center; padding:clamp(60px,9vw,110px) 24px clamp(40px,6vw,60px);">
    <div style="font-size:11px; letter-spacing:6px; text-transform:uppercase; color:var(--gold,#c9a24a); margin-bottom:20px;">Our Work</div>
    <h1 style="font-family:'Cormorant Garamond',serif; font-weight:500; font-size:clamp(42px,7vw,84px); margin:0; color:#f6f0e2;">The <em style="font-style:italic; color:var(--gold,#c9a24a);">Gallery</em></h1>
    <div style="width:64px; height:1px; background:var(--gold,#c9a24a); margin:28px auto 0;"></div>
    <p style="max-width:480px; margin:26px auto 0; font-size:15px; line-height:1.8; color:#c7bda9;">A glimpse of our bridal transformations, styling sessions, and studio moments.</p>
  </section>

  <!-- MASONRY GRID -->
  <section style="padding:0 clamp(16px,3vw,48px) clamp(72px,10vw,120px);">
    <div style="columns:4 260px; column-gap:14px; max-width:1400px; margin:0 auto;">
      <sc-for list="{{ items }}" as="g" hint-placeholder-count="12">
        <div class="ph" style="break-inside:avoid; margin-bottom:14px; background-color:#13100b; border:1px solid rgba(201,162,74,0.14); border-radius:var(--radius,4px); display:flex; align-items:flex-end; padding:16px; height:{{ g.h }};">
          <span style="font-family:monospace; font-size:10px; color:#6b6152;">{{ g.label }}</span>
        </div>
      </sc-for>
    </div>
  </section>

  <!-- CTA -->
  <section style="text-align:center; padding:0 24px clamp(72px,10vw,110px);">
    <h2 style="font-family:'Cormorant Garamond',serif; font-weight:500; font-size:clamp(28px,4vw,44px); margin:0 0 24px; color:#f4eede;">Ready for your transformation?</h2>
    <a href="https://wa.me/919887181819?text=Hi%20Nidhi%2C%20I'd%20like%20to%20book%20an%20appointment" style="display:inline-flex; align-items:center; gap:10px; padding:15px 32px; background:var(--gold,#c9a24a); color:#0d0b09; font-size:13px; letter-spacing:2px; text-transform:uppercase; border-radius:var(--radius,4px);">Book on WhatsApp</a>
  </section>

  <footer style="padding:44px 24px; text-align:center; background:#100d0a; border-top:1px solid rgba(201,162,74,0.14);">
    <div style="font-family:'Cormorant Garamond',serif; font-size:22px; color:#f4eede;">Unisex Salon By Nidhi</div>
    <p style="margin:12px 0 0; font-size:12px; letter-spacing:1px; color:#6b6152;">© 2026 Unisex Salon By Nidhi · Jaipur, Rajasthan</p>
  </footer>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;gold&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#c9a24a&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#c9a24a&quot;,&quot;#b8873b&quot;,&quot;#d4af37&quot;,&quot;#cbb892&quot;]},&quot;radius&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;4px&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;0px&quot;,&quot;4px&quot;,&quot;14px&quot;]}}">
class Component extends DCLogic {
  renderVals() {
    return {
      gold: this.props.gold ?? "#c9a24a",
      radius: this.props.radius ?? "4px",
      items: [
        { label: "bridal look 01", h: "340px" },
        { label: "hair styling", h: "260px" },
        { label: "party makeup", h: "300px" },
        { label: "studio interior", h: "240px" },
        { label: "hair colour", h: "320px" },
        { label: "facial / skincare", h: "270px" },
        { label: "bridal look 02", h: "360px" },
        { label: "nail art", h: "240px" },
        { label: "grooming", h: "300px" },
        { label: "before / after", h: "280px" },
        { label: "team at work", h: "250px" },
        { label: "bridal look 03", h: "330px" },
      ],
    };
  }
}
</script>
</body>
</html>
